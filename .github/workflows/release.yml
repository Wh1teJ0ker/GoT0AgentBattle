name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的版本标签，例如 v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  VERSION_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build:
    name: Build ${{ matrix.asset_name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            goos: linux
            goarch: amd64
            asset_name: linux-amd64
          - runner: windows-latest
            goos: windows
            goarch: amd64
            asset_name: windows-amd64
          - runner: macos-14
            goos: darwin
            goarch: arm64
            asset_name: macos-arm64

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Sync version metadata
        run: python3 scripts/sync_version.py

      - name: Validate tag matches .version
        shell: bash
        run: |
          test "${VERSION_TAG}" = "$(tr -d '\r\n' < .version)"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Wails app
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          if [ "${{ matrix.goos }}" = "linux" ]; then
            "$(go env GOPATH)/bin/wails" build -clean -tags webkit2_41
          else
            "$(go env GOPATH)/bin/wails" build -clean
          fi

      - name: Package Linux artifact
        if: matrix.goos == 'linux'
        shell: bash
        run: |
          mkdir -p dist
          tar -C build/bin -czf "dist/GoT0AgentBattle-${VERSION_TAG}-${{ matrix.asset_name }}.tar.gz" GoT0AgentBattle

      - name: Package macOS artifact
        if: matrix.goos == 'darwin'
        shell: bash
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "build/bin/GoT0AgentBattle.app" "dist/GoT0AgentBattle-${VERSION_TAG}-${{ matrix.asset_name }}.zip"

      - name: Package Windows artifact
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path build/bin/GoT0AgentBattle.exe -DestinationPath "dist/GoT0AgentBattle-${env:VERSION_TAG}-${{ matrix.asset_name }}.zip" -Force

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset_name }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Create or update release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${VERSION_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
            gh release create "${VERSION_TAG}" --repo "${GITHUB_REPOSITORY}" --title "${VERSION_TAG}" --generate-notes

          gh release delete-asset "${VERSION_TAG}" "GoT0AgentBattle-${VERSION_TAG}-source.tar.gz" --repo "${GITHUB_REPOSITORY}" -y || true

          gh release upload "${VERSION_TAG}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
