name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate tag matches .version
        run: |
          test "${GITHUB_REF_NAME}" = "$(cat .version | tr -d '\n')"

      - name: Sync version metadata
        run: python3 scripts/sync_version.py

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Go test
        run: go test ./...

      - name: Package source bundle
        run: |
          mkdir -p dist
          tar --exclude='./dist' --exclude='./frontend/node_modules' --exclude='./frontend/dist' -czf "dist/GoT0AgentBattle-${GITHUB_REF_NAME}-source.tar.gz" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/GoT0AgentBattle-${{ github.ref_name }}-source.tar.gz
