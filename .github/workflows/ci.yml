name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Sync version metadata
        run: python3 scripts/sync_version.py

      - name: Check frontend package version matches .version
        run: |
          test "$(tr -d '\r\n' < .version | sed 's/^v//')" = "$(node -p "require('./frontend/package.json').version")"

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Go test
        run: go test ./...

      - name: Verify Wails config references official frontend commands
        run: |
          grep -q '"frontend:build": "npm run build"' wails.json
          grep -q '"frontend:dev:watcher": "npm run dev"' wails.json
